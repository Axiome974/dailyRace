<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Daily Race</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/js/all.min.js" integrity="sha512-6BTOlkauINO65nLhXhthZMtepgJSghyimIalb+crKRPhvhmsCdnIuGcVbR5/aQY2A+260iC1OPy1oCdB6pSSwQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/@hiseb/confetti@2.1.0/dist/confetti.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&family=Luckiest+Guy&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>


    <link rel="stylesheet" href="assets/style.css">

</head>
<body class="grass-bg">

<div class="player-victory-overlay d-none" id="victory-overlay">
    <img src="assets/images/victory.png" alt="" height="620">
    <img src="assets/images/__CHAR__.png" alt="" style="position: fixed; top:35%" width="520" class="animate__animated animate__infinite animate__bounce" id="victory-picture">
    <button class="btn-go mt-4" style="z-index: 1000" id="victory-button">Bravo</button>
</div>

<div class="player-animation-overlay d-none" id="animation-overlay">
    <div class="player-animation-card">
        <h1 class="player-animation-name">Damien</h1>
    </div>
    <div class="d-flex flex-column gap-2  animate__animated animate__flipInX d-none" id="result-choices">
        <button class="btn btn-go" id="add-score-button">+1 <i class="fas fa-trophy"></i></button>
        <button class="btn btn-cancel" id="not-this-time-button">Pas cette fois!</button>
    </div>
</div>

<div class="player-animation-overlay d-none" id="add-player-overlay">
    <div class="container">
        <div class="d-flex justify-content-center">


            <div class="card" style="width: 50%">
                <div class="card-body">
                    <h1 class="text-white">Nouveau joueur</h1>
                    <form action="">
                        <div class="text-center">
                            <img src="./assets/images/cocci.png" alt="" class="img-fluid" width="256">
                        </div>
                        <div class="mb-2">
                            <select name="skins" id="character" class="form-select">
                                <option value="0">-- Choisissez un skin --</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <input type="text" class="form-control" placeholder="Nom du joueur">
                        </div>
                        <div class="mb-2">
                            <input type="text" class="form-control" placeholder="Url de l'avatar">
                        </div>
                        <div class="mb-2 text-end">
                            <button class="btn btn-danger" type="button">annuler</button>
                            <button class="btn btn-success" type="submit">En course!</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>


</div>


<div class="container position-relative">
    <div class="row">
        <div class="col-6 horse-road p-0">
            <div class="arrival"></div>
            <div class="start"></div>
            <div class="race-zone" id="race-zone">
                <template id="player-card-template">
                    <div class="player-card">
                        <div class="character w-100">
                            <div class="player-name text-white fw-bold"></div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
        <div class="col-1"></div>
        <div class="col-5 players">
            <div class="card">
                <div class="card-header">
                    <div class="d-flex justify-content-between">
                        <div class="card-title fw-bold h5"> <i class="fa-solid fa-flag-checkered me-2"></i> En course</div>
                        <div>
                            <button id="menu-btn-reset" class="btn-menu-panel" title="Redémarrer la partie">
                                <i class="fas fa-refresh" ></i>
                            </button>
                            <button id="menu-btn-edit" class="btn-menu-panel" title="Modifier les scores">
                                <i class="fas fa-pencil" ></i>
                            </button>
<!--                            <button class="btn-menu-panel" id="menu-btn-add-user">-->
<!--                            <i class="fas fa-user-plus" ></i>-->
<!--                            </button>-->
                            <button class="btn-menu-panel" id="menu-btn-share" title="Partager les scores">
                            <i class="fas fa-share-nodes" ></i>
                            </button>
<!--                            <button class="btn-menu-panel" id="menu-btn-settings">-->
<!--                            <i class="fas fa-gear" ></i>-->
<!--                            </button>-->
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="score-view">
                        <div class="text-center h5 mb-3 mt-2 fw-bold text-white">
                            <i class="fas fa-trophy me-2"></i> 10 Points pour remporter le prix
                        </div>
                        <ul class="list-group mt-4" id="player-score-list">
                            <template id="player-score-template">
                                <li class="list-group-item">
                                    <div class="d-flex gap-3 align-items-center justify-content-between">
                                        <div class="d-flex gap-3 align-items-center">
                                            <div class="avatar"></div>
                                            <div class="fw-bold player-name"></div>
                                        </div>
                                        <div class="d-flex gap-2">
                                            <div class="d-flex align-items-center badge bg-success rounded-pill p-2" style="font-size: 1rem">
                                                <i class="fas fa-trophy me-1"></i><span class="points fw-bold m-0"></span>
                                            </div>
                                            <div class="badge bg-danger rounded-pill align-items-center edit-score-buttons">
                                                <div><button class="btn btn-sm btn-menu-panel" data-action="click:addPoint"><i class="fas fa-plus-circle"></i></button></div>
                                                <div><button class="btn btn-sm btn-menu-panel" data-action="click:removePoint"><i class="fas fa-minus-circle"></i></button></div>
                                            </div>
                                        </div>
                                    </div>
                                </li>
                            </template>
                        </ul>
                        <div class="w-100 mt-5 p-5">
                            <button class="btn btn-go w-100  animate__infinite animate__animated animate__pulse" id="go-button">
                                <i class="fa-solid fa-horse me-2"></i> C'est parti!
                            </button>
                        </div>
                    </div>
                    <div class="share-view d-none">
                        <textarea rows="10" style="height: 100%" class="form-control" id="player-share-area"></textarea>
                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <div>
                                <button class="btn btn-primary" id="export-button">
                                    Export
                                </button>
                            </div>
                            <div>
                                <button class="btn btn-primary" id="import-button">
                                    Import
                                </button>
                            </div>
                            <div>
                                <button class="btn btn-danger" id="share-cancel-button">
                                    Retour
                                </button>
                            </div>
                        </div>
                    </div>
            </div>

        </div>
    </div>
    </div>

</div>

<script type="text/javascript" src="assets/app.js"></script>

</body>

</html>
